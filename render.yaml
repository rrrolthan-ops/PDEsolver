# Render.com infrastructure-as-code spec.
# Deploy by pointing a Render Blueprint at this repo:
#   https://dashboard.render.com → New → Blueprint
#
# The two services are linked: the frontend's build picks up the
# backend's public URL via the `fromService` env var.

services:
  - type: web
    name: pdesolver-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      # ANTHROPIC_API_KEY is intentionally NOT declared here so Render
      # doesn't block Apply asking the user to provide a value.
      #
      # The backend handles its absence gracefully:
      #   * Manual LaTeX input → fully functional.
      #   * Natural-language input → deterministic templates work
      #     ("ecuación del calor en una barra…"). LLM fallback is
      #     disabled (returns 503 with a clear message).
      #   * Image upload → disabled (returns 503).
      #
      # If you later want the LLM-backed features, add the variable
      # manually in the Render dashboard: backend service →
      # Environment → Add Environment Variable.
      - key: DATABASE_URL
        # On the FREE plan Render does not allow persistent disks, so
        # we put the SQLite file under /tmp (writable but ephemeral).
        # The library tab still works during a session; it just gets
        # wiped when the container restarts.
        #
        # To persist across restarts: upgrade this service to the
        # Starter plan ($7/mo) and uncomment the `disk:` block below,
        # replacing this value with `sqlite:///./data/pdesolver.db`.
        value: sqlite:////tmp/pdesolver.db
    healthCheckPath: /health
    # Persistent disk — available only on paid plans. Uncomment to
    # restore library persistence after upgrading from free.
    # disk:
    #   name: data
    #   mountPath: /opt/render/project/src/backend/data
    #   sizeGB: 1

  - type: web
    name: pdesolver-frontend
    runtime: static
    rootDir: frontend
    # Static sites don't take a `plan` field — they have their own
    # pricing model (build minutes + bandwidth, free tier generous).
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: pdesolver-backend
          type: web
          property: host
    routes:
      # SPA fallback so client-side routing works.
      - type: rewrite
        source: /*
        destination: /index.html
